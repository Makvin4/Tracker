<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Данные</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000000;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      color: #ffffff;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
      padding: 0 0 16px 0;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
      visibility: visible;
      transition: opacity 0.7s cubic-bezier(0.23, 1, 0.32, 1), visibility 0.7s;
      pointer-events: none;
    }

    .loading-symbol {
      font-size: 140px;
      font-weight: 300;
      color: #ffffff;
      opacity: 0.9;
      text-shadow: 0 0 30px rgba(255,255,255,0.3);
      animation: subtlePulse 2.2s infinite;
    }

    @keyframes subtlePulse {
      0% { opacity: 0.75; transform: scale(0.98); }
      50% { opacity: 1; transform: scale(1); }
      100% { opacity: 0.75; transform: scale(0.98); }
    }

    .loading-overlay.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .ios-root {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      padding: 18px 16px 32px 16px;
    }

    .ios-title-section {
      margin-bottom: 28px;
    }

    .ios-large-title {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #ffffff;
      line-height: 1.1;
      margin-bottom: 6px;
    }

    .ios-subhead {
      font-size: 15px;
      font-weight: 400;
      color: #8e8e93;
      letter-spacing: -0.2px;
    }

    .ios-section {
      background: #1c1c1e;
      border-radius: 16px;
      margin-bottom: 28px;
      overflow: hidden;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 0.5px solid #3a3a3c;
    }

    .ios-section-header {
      padding: 14px 18px 6px 18px;
      font-size: 13px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      color: #8e8e93;
    }

    .ios-row {
      display: flex;
      align-items: flex-start;
      padding: 14px 18px;
      border-bottom: 0.5px solid #2c2c2e;
    }

    .ios-row:last-child {
      border-bottom: none;
    }

    .row-label {
      width: 130px;
      flex-shrink: 0;
      font-size: 16px;
      font-weight: 400;
      color: #8e8e93;
      letter-spacing: -0.3px;
    }

    .row-value {
      flex: 1;
      font-size: 16px;
      font-weight: 400;
      color: #ffffff;
      word-break: break-word;
      text-align: right;
    }

    .mono-value {
      font-family: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
      font-size: 14px;
      color: #d1d1d6;
    }

    .footnote {
      margin-top: 8px;
      padding: 0 18px;
      font-size: 12px;
      color: #8e8e93;
    }

    .tag-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-end;
    }

    .tag {
      background: #2c2c2e;
      padding: 4px 10px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 500;
      color: #ffffff;
      border: 0.5px solid #3a3a3c;
    }

    .tag-neutral {
      color: #ffffff;
    }

    .loading-placeholder {
      text-align: right;
      color: #8e8e93;
    }

    @media (max-width: 480px) {
      .row-label {
        width: 110px;
        font-size: 15px;
      }
      .ios-large-title {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-symbol">⚚</div>
</div>

<div class="ios-root">
  <div class="ios-title-section">
    <div class="ios-large-title">Данные</div>
    <div class="ios-subhead">Устройство и сеть</div>
  </div>

  <div class="ios-section">
    <div class="ios-section-header">Общие сведения</div>
    <div class="ios-row">
      <span class="row-label">Время</span>
      <span class="row-value" id="localTimeDisplay"></span>
    </div>
    <div class="ios-row">
      <span class="row-label">Устройство</span>
      <span class="row-value" id="deviceTypeDisplay"></span>
    </div>
    <div class="ios-row">
      <span class="row-label">Браузер</span>
      <span class="row-value" id="browserDisplay"></span>
    </div>
    <div class="ios-row">
      <span class="row-label">Язык</span>
      <span class="row-value" id="languageDisplay"></span>
    </div>
    <div class="ios-row">
      <span class="row-label">Платформа</span>
      <span class="row-value" id="platformDisplay"></span>
    </div>
    <div class="ios-row">
      <span class="row-label">Экран</span>
      <span class="row-value" id="screenDisplay"></span>
    </div>
    <div class="ios-row">
      <span class="row-label">Часовой пояс</span>
      <span class="row-value" id="timezoneDisplay"></span>
    </div>
    <div class="ios-row">
      <span class="row-label">Интернет</span>
      <span class="row-value" id="onlineDisplay"></span>
    </div>
    <div class="ios-row">
      <span class="row-label">User Agent</span>
      <span class="row-value mono-value" id="uaDisplay"></span>
    </div>
  </div>

  <div class="ios-section" id="ipSection">
    <div class="ios-section-header">Сетевые данные</div>
    <div id="ipDataContainer">
      <div class="ios-row">
        <span class="row-label">Загрузка</span>
        <span class="row-value loading-placeholder">ожидание ответа</span>
      </div>
    </div>
  </div>
  
  <div class="footnote">ipapi.is</div>
</div>

<script>
  (function() {
    const $ = (id) => document.getElementById(id);

    function formatLocalTime() {
      return new Date().toLocaleString('ru-RU');
    }

    function updateLocalTime() {
      if ($('localTimeDisplay')) {
        $('localTimeDisplay').textContent = formatLocalTime();
      }
    }

    function detectBrowser(ua) {
      if (ua.includes("Edg/")) return "Microsoft Edge";
      if (ua.includes("OPR") || ua.includes("Opera")) return "Opera";
      if (ua.includes("Chrome")) return "Google Chrome";
      if (ua.includes("Firefox")) return "Mozilla Firefox";
      if (ua.includes("Safari")) return "Safari";
      return "Неизвестный";
    }

    function detectDeviceType(ua) {
      if (/Mobile|Android|iPhone|iPad|iPod/i.test(ua)) return "Телефон / Планшет";
      return "Компьютер";
    }

    const ua = navigator.userAgent;
    const language = navigator.language || '';
    const platform = navigator.platform || '';
    const screenW = screen.width;
    const screenH = screen.height;
    const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const online = navigator.onLine ? "Да" : "Нет";

    updateLocalTime();
    $('deviceTypeDisplay').textContent = detectDeviceType(ua);
    $('browserDisplay').textContent = detectBrowser(ua);
    $('languageDisplay').textContent = language;
    $('platformDisplay').textContent = platform;
    $('screenDisplay').textContent = `${screenW} × ${screenH}`;
    $('timezoneDisplay').textContent = timezone;
    $('onlineDisplay').textContent = online;
    
    const uaShort = ua.length > 80 ? ua.substring(0, 80) + '…' : ua;
    $('uaDisplay').textContent = uaShort;

    setInterval(updateLocalTime, 1000);

    const container = $('ipDataContainer');
    
    function countryCodeToFlag(code) {
      if (!code) return '';
      const upper = code.toUpperCase();
      return upper.replace(/./g, ch => 
        String.fromCodePoint(127397 + ch.charCodeAt())
      ) + ' ';
    }

    function renderIPData(data) {
      if (!data || !data.ip) {
        showIPError('Не удалось загрузить данные');
        return;
      }

      const loc = data.location || {};
      const comp = data.company || {};
      const asn = data.asn || {};
      const abuse = data.abuse || {};

      const flagEmoji = countryCodeToFlag(loc.country_code);
      
      let apiLocalTimeStr = '';
      if (loc.local_time) {
        try {
          apiLocalTimeStr = new Date(loc.local_time).toLocaleString('ru-RU');
        } catch(e) { apiLocalTimeStr = loc.local_time; }
      } else {
        apiLocalTimeStr = '';
      }

      const lat = loc.latitude;
      const lon = loc.longitude;
      const coords = (lat && lon) ? `${lat}, ${lon}` : '';
      
      const cityState = `${loc.city || ''}, ${loc.state || ''}`.replace(/^, |, $/g, '') || '';
      
      const tags = [];
      if (data.is_vpn) tags.push('VPN');
      if (data.is_proxy) tags.push('Proxy');
      if (data.is_tor) tags.push('Tor');
      if (data.is_datacenter) tags.push('Хостинг');
      if (data.is_mobile) tags.push('Мобильная');
      if (data.is_crawler) tags.push('Бот');
      
      const securityTagsHtml = tags.length 
        ? tags.map(t => `<span class="tag">${t}</span>`).join('') 
        : '<span class="tag tag-neutral">Чистое</span>';

      const provider = comp.name || asn.org || asn.descr || '';
      
      const asnDisplay = asn.asn ? `AS${asn.asn} ${asn.descr ? '· '+asn.descr : ''}` : '';
      
      const companyType = comp.type ? comp.type.toUpperCase() : '';
      
      const abuseContact = abuse.email || asn.abuse || '';
      
      const providerDomain = comp.domain ? comp.domain : null;

      let rowsHtml = `
        <div class="ios-row">
          <span class="row-label">IP адрес</span>
          <span class="row-value">${flagEmoji}${data.ip}</span>
        </div>
        <div class="ios-row">
          <span class="row-label">Страна</span>
          <span class="row-value">${loc.country || ''} (${loc.country_code || ''})</span>
        </div>
        <div class="ios-row">
          <span class="row-label">Город / Регион</span>
          <span class="row-value">${cityState}</span>
        </div>
        <div class="ios-row">
          <span class="row-label">Индекс</span>
          <span class="row-value">${loc.zip || ''}</span>
        </div>
        <div class="ios-row">
          <span class="row-label">Координаты</span>
          <span class="row-value">${coords}</span>
        </div>
        <div class="ios-row">
          <span class="row-label">Локальное время</span>
          <span class="row-value">${apiLocalTimeStr}</span>
        </div>
        <div class="ios-row">
          <span class="row-label">Провайдер</span>
          <span class="row-value">${provider}</span>
        </div>
        <div class="ios-row">
          <span class="row-label">ASN</span>
          <span class="row-value mono-value">${asnDisplay}</span>
        </div>
        <div class="ios-row">
          <span class="row-label">Тип сети</span>
          <span class="row-value">${companyType}</span>
        </div>
      `;

      if (providerDomain) {
        rowsHtml += `
        <div class="ios-row">
          <span class="row-label">Домен</span>
          <span class="row-value">${providerDomain}</span>
        </div>`;
      }

      rowsHtml += `
        <div class="ios-row">
          <span class="row-label">Безопасность</span>
          <span class="row-value">
            <div class="tag-group">
              ${securityTagsHtml}
            </div>
          </span>
        </div>
        <div class="ios-row">
          <span class="row-label">Контакт</span>
          <span class="row-value mono-value">${abuseContact}</span>
        </div>
      `;

      container.innerHTML = rowsHtml;
    }

    function showIPError(message) {
      container.innerHTML = `
        <div class="ios-row">
          <span class="row-label">Ошибка</span>
          <span class="row-value" style="color: #ff453a;">${message}</span>
        </div>
        <div class="ios-row">
          <span class="row-label">Резерв</span>
          <span class="row-value loading-placeholder" id="fallbackIp">проверка ipify</span>
        </div>
      `;
      
      fetch('https://api.ipify.org?format=json')
        .then(res => res.json())
        .then(data => {
          if (data.ip) {
            const fb = $('fallbackIp');
            if (fb) {
              fb.textContent = data.ip;
              fb.style.color = '#ffffff';
            }
          }
        })
        .catch(() => {});
    }

    fetch('https://api.ipapi.is/')
      .then(response => {
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
      })
      .then(data => renderIPData(data))
      .catch(err => {
        console.warn('ipapi.is error:', err);
        showIPError('Сервис недоступен');
      });

    window.addEventListener('load', function() {
      const overlay = $('loadingOverlay');
      setTimeout(() => {
        overlay.classList.add('hidden');
      }, 3000);
    });
  })();
</script>
</body>
</html>
